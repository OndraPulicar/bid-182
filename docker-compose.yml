version: "3.9"

services:
  backend:
    build: ./backend
    container_name: auction-backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    depends_on:
      - db
    command: npm run dev

  db:
    image: postgres:15
    container_name: auction-db
    restart: always
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PWD}
      POSTGRES_DB: auction_db
    ports:
      - "5432:5432"
    volumes:
      - ./db/data:/var/lib/postgresql/data